services:
  web:
    build:
      context: ./evraz-market-smr
    container_name: mercurimetall-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=4000
    expose:
      - "4000"
    networks:
      - mercurimetall

  api:
    build:
      context: ./node-email-form
    container_name: mercurimetall-api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - MAIL_FROM=${MAIL_FROM}
      - MAIL_TO=${MAIL_TO}
    expose:
      - "3000"
    networks:
      - mercurimetall

  nginx:
    image: nginx:1.27-alpine
    container_name: mercurimetall-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - web
      - api
    networks:
      - mercurimetall

  certbot:
    image: certbot/certbot:latest
    container_name: mercurimetall-certbot
    volumes:
      - ./nginx/certbot/www:/var/www/certbot
      - ./nginx/certbot/conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  mercurimetall:
    driver: bridge
